name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: backdoor_test
          POSTGRES_USER: backdoor_user
          POSTGRES_PASSWORD: backdoor_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://backdoor_user:backdoor_password@localhost:5432/backdoor_test

      - name: Run migrations
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://backdoor_user:backdoor_password@localhost:5432/backdoor_test

      - name: Run tests
        working-directory: apps/api
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://backdoor_user:backdoor_password@localhost:5432/backdoor_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Build
        working-directory: apps/api
        run: npm run build
        env:
          DATABASE_URL: postgresql://backdoor_user:backdoor_password@localhost:5432/backdoor_test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - working-directory: apps/api
        run: npm run lint
