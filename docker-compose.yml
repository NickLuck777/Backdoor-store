version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: backdoor_postgres
    environment:
      POSTGRES_DB: backdoor_store
      POSTGRES_USER: backdoor_user
      POSTGRES_PASSWORD: backdoor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backdoor_user -d backdoor_store"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backdoor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: backdoor_api
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev
    profiles: ["full"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: backdoor_web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev
    profiles: ["full"]

volumes:
  postgres_data:
  redis_data:
